<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炫式NLP 闖關遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FFF8F0;--coral:#FF6B35;--navy:#1a1a2e;--gold:#f39c12;
  --green:#2ecc71;--red:#e74c3c;--purple:#9b59b6;--blue:#3498db;--teal:#1abc9c;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:12px 10px 80px;
  user-select:none;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,#e0d6cc 1px,transparent 1px);
  background-size:22px 22px;opacity:0.4;pointer-events:none;z-index:0;}

/* ── OVERLAYS ── */
#flash{position:fixed;inset:0;pointer-events:none;z-index:300;opacity:0;transition:opacity 0.08s;}
#eventBanner{
  position:fixed;top:0;left:0;right:0;z-index:250;padding:16px 20px;
  text-align:center;font-size:16px;font-weight:900;color:var(--navy);
  transform:translateY(-100%);transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
  letter-spacing:1px;line-height:1.5;
}
#eventBanner.show{transform:translateY(0);}
#eventBanner.speed{background:linear-gradient(135deg,#e74c3c,#c0392b);}
#eventBanner.gold{background:linear-gradient(135deg,#f39c12,#e67e22);}
#eventBanner.blue{background:linear-gradient(135deg,#3498db,#2980b9);}
#eventBanner.purple{background:linear-gradient(135deg,#9b59b6,#8e44ad);}
#eventBanner.teal{background:linear-gradient(135deg,#1abc9c,#16a085);}

/* ── LEVEL UP ── */
#luOverlay{
  position:fixed;inset:0;z-index:400;background:rgba(255,248,240,0.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
#luOverlay.show{display:flex;animation:fadeIn 0.3s ease;}
.lu-icon{font-size:72px;}
.lu-title{font-size:36px;font-weight:900;color:var(--coral);}
.lu-next{font-size:18px;font-weight:900;color:var(--navy);}
.lu-desc{font-size:13px;color:#aaa;font-weight:700;text-align:center;max-width:300px;line-height:1.6;}
.lu-xp{font-size:13px;color:var(--gold);font-weight:700;}
.lu-btn{margin-top:12px;background:var(--coral);color:var(--navy);border:none;
  padding:13px 36px;border-radius:40px;font-size:15px;font-weight:900;cursor:pointer;
  box-shadow:3px 3px 0 #c0390d;font-family:'Noto Sans TC',sans-serif;transition:transform 0.1s;}
.lu-btn:hover{transform:translateY(-2px);}

/* ── CHAPTER SELECT ── */
#chapterSelect{
  width:100%;max-width:580px;position:relative;z-index:1;
}
.cs-header{text-align:center;margin-bottom:20px;}
.cs-logo{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.cs-logo span{color:var(--coral);}
.cs-sub{font-size:12px;color:#aaa;font-weight:700;}
.ch-grid{display:flex;flex-direction:column;gap:10px;}
.ch-card{
  background:#fff;border:2.5px solid #e0d6cc;border-radius:14px;
  padding:16px 18px;cursor:pointer;box-shadow:3px 3px 0 #e0d6cc;
  transition:all 0.15s;display:flex;align-items:center;gap:14px;
}
.ch-card:hover{transform:translateY(-2px);border-color:var(--coral);box-shadow:4px 4px 0 var(--coral);}
.ch-card.locked{opacity:0.45;cursor:not-allowed;filter:grayscale(0.5);}
.ch-card.locked:hover{transform:none;border-color:#e0d6cc;box-shadow:3px 3px 0 #e0d6cc;}
.ch-card.done{border-color:var(--green);box-shadow:3px 3px 0 #b8ede6;}
.ch-icon{font-size:28px;min-width:36px;text-align:center;}
.ch-info{flex:1;}
.ch-num{font-size:9px;font-weight:900;color:#bbb;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.ch-name{font-size:15px;font-weight:900;color:var(--navy);margin-bottom:2px;}
.ch-eng{font-size:10px;color:#bbb;font-weight:700;}
.ch-status{font-size:11px;font-weight:700;color:#ccc;}
.ch-status.done{color:var(--green);}
.ch-status.locked-txt{color:#ddd;}

/* ── GAME SCREEN ── */
#gameScreen{display:none;width:100%;max-width:580px;position:relative;z-index:1;}
.gs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.gs-back{background:#fff;border:2px solid #e0d6cc;border-radius:8px;padding:6px 12px;
  font-size:11px;font-weight:900;color:var(--navy);cursor:pointer;
  box-shadow:2px 2px 0 #e0d6cc;font-family:'Noto Sans TC',sans-serif;}
.gs-back:hover{border-color:var(--navy);}
.gs-title{font-size:14px;font-weight:900;color:var(--navy);text-align:center;}
.gs-lvl{font-size:11px;font-weight:900;color:var(--coral);}

.stats-row{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.stat{background:#fff;border:2px solid #e0d6cc;border-radius:10px;padding:7px 4px;text-align:center;box-shadow:2px 2px 0 #e0d6cc;}
.stat .lbl{font-size:8px;font-weight:900;color:#bbb;letter-spacing:1px;margin-bottom:3px;}
.stat .val{font-size:14px;font-weight:900;color:var(--navy);}

.xp-wrap{width:100%;margin-bottom:10px;}
.xp-meta{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:#bbb;margin-bottom:4px;}
.xp-track{height:8px;background:#ede5dc;border:2px solid #e0d6cc;border-radius:20px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--coral),var(--gold));border-radius:20px;transition:width 0.5s ease;}

/* Progress dots */
.q-dots{display:flex;gap:5px;justify-content:center;margin-bottom:10px;}
.q-dot{width:8px;height:8px;border-radius:50%;background:#e0d6cc;transition:all 0.3s;}
.q-dot.done{background:var(--green);}
.q-dot.order-dot{border-radius:3px;}
.q-dot.eye-dot{border-radius:50%;border:2px solid var(--teal);background:transparent;}
.q-dot.eye-dot.done{background:var(--teal);border-color:var(--teal);}
.q-dot.wrong{background:var(--red);}
.q-dot.current{background:var(--coral);transform:scale(1.3);}

/* Timer */
#timerWrap{width:100%;margin-bottom:8px;display:none;}
#timerBar{height:7px;border-radius:20px;transition:width 0.1s linear;}
.tpulse{animation:tpulse 0.5s ease-in-out infinite;}

/* Question card */
#qCard{
  width:100%;background:#fff;border:2.5px solid #e0d6cc;border-radius:14px;
  padding:20px 17px;margin-bottom:12px;box-shadow:4px 4px 0 #e0d6cc;
  transition:border-color 0.2s;
}
#qCard.speed{border-color:var(--red);box-shadow:4px 4px 0 #f5b8b8,0 0 14px rgba(231,76,60,0.15);}
#qCard.dbl{border-color:var(--gold);box-shadow:4px 4px 0 #fde8cc,0 0 14px rgba(243,156,18,0.15);}

.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.q-badge{display:inline-block;background:var(--coral);color:var(--navy);font-size:8px;font-weight:900;
  padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.q-badge.gd{background:var(--gold);}
.q-badge.rd{background:var(--red);}
.q-num{font-size:10px;font-weight:700;color:#ccc;}
#eventTag{font-size:10px;font-weight:900;min-height:16px;margin-bottom:5px;}
#qText{font-size:14px;font-weight:800;color:var(--navy);line-height:1.7;margin-bottom:16px;}

.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  background:#fafafa;border:2px solid #e8e0d8;color:var(--navy);
  padding:11px 13px;border-radius:10px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;
  text-align:left;transition:all 0.15s;display:flex;align-items:flex-start;gap:10px;
  box-shadow:2px 2px 0 #e8e0d8;
}
.opt:hover:not(:disabled){border-color:var(--coral);color:var(--coral);
  background:#fff5f0;transform:translateX(3px);box-shadow:3px 3px 0 var(--coral);}
.opt:disabled{cursor:default;}
.opt.correct{border-color:var(--green);background:#f0fff6;color:#1a9150;box-shadow:2px 2px 0 var(--green);animation:popIn 0.3s ease;}
.opt.wrong{border-color:var(--red);background:#fff5f5;color:var(--red);box-shadow:2px 2px 0 var(--red);}
.opt.dim{border-color:#eee;color:#ccc;background:#f9f9f9;pointer-events:none;text-decoration:line-through;}
.opt.reveal{border-color:#ddd;color:#ccc;}
.opt-ltr{font-size:10px;font-weight:900;color:#999;min-width:16px;padding-top:1px;}
#feedback{text-align:center;font-size:13px;font-weight:900;margin-top:10px;min-height:18px;}

/* Actions */
#actBar{width:100%;display:none;gap:8px;margin-bottom:12px;}
.act-btn{
  flex:1;background:#fff;border:2px solid #e0d6cc;color:var(--navy);
  padding:9px;border-radius:10px;font-family:'Noto Sans TC',sans-serif;
  font-size:12px;font-weight:900;cursor:pointer;box-shadow:2px 2px 0 #e0d6cc;transition:all 0.15s;}
.act-btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px);}
.act-btn:disabled{color:#ccc;border-color:#eee;cursor:default;transform:none;}
.act-btn.next-btn{background:var(--coral);color:var(--navy);border-color:var(--coral);box-shadow:2px 2px 0 #c0390d;}

/* ── MINI GAMES ── */
/* Flip */
#flipGame{
  display:none;width:100%;background:#fff;border:2.5px solid var(--blue);
  border-radius:14px;padding:18px;box-shadow:4px 4px 0 #b8d4f5;margin-bottom:12px;
}
#flipGame h2{font-size:15px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:3px;}
.mini-sub{font-size:11px;color:#aaa;text-align:center;margin-bottom:13px;font-weight:700;}
.flip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.fc{aspect-ratio:1;border-radius:10px;cursor:pointer;position:relative;
  transform-style:preserve-3d;transition:transform 0.4s;}
.fc.flipped{transform:rotateY(180deg);}
.fc.matched{transform:rotateY(180deg);pointer-events:none;}
.fc-f,.fc-b{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;
  justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  font-size:11px;font-weight:900;text-align:center;padding:5px;border:2px solid #e0d6cc;}
.fc-f{background:var(--navy);}
.fc-f::after{content:'？';color:var(--navy);font-size:18px;}
.fc-b{background:#f0f8ff;color:var(--navy);transform:rotateY(180deg);border-color:var(--blue);line-height:1.3;}
.fc.matched .fc-b{background:#f0fff6;border-color:var(--green);color:var(--green);}
#flipFb{text-align:center;margin-top:10px;font-size:12px;font-weight:800;color:#aaa;min-height:16px;}

/* Sort */
#sortGame{
  display:none;width:100%;background:#fff;border:2.5px solid var(--purple);
  border-radius:14px;padding:18px;box-shadow:4px 4px 0 #d8b8f5;margin-bottom:12px;
}
#sortGame h2{font-size:15px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:3px;}
.sort-pool{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
  border:2px dashed #e0d6cc;border-radius:10px;padding:10px;margin-bottom:14px;min-height:46px;}
.s-chip{background:var(--navy);color:var(--navy);padding:6px 13px;border-radius:20px;
  font-size:12px;font-weight:800;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.s-chip:hover{transform:scale(1.05);border-color:var(--coral);}
.s-chip.sel{background:var(--coral);}
.sort-bins{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.s-bin{background:#f9f5f0;border:2px dashed #e0d6cc;border-radius:10px;padding:10px;min-height:76px;cursor:pointer;}
.s-bin h3{font-size:10px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:7px;line-height:1.4;}
.s-bin-chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.s-bin-chip{background:#e8e0d8;color:var(--navy);padding:4px 9px;border-radius:20px;
  font-size:11px;font-weight:800;cursor:pointer;}
.s-bin-chip:hover{background:var(--red);color:var(--navy);}
.sort-ok{width:100%;margin-top:11px;background:var(--purple);color:var(--navy);border:none;
  padding:10px;border-radius:10px;font-family:'Noto Sans TC',sans-serif;font-size:13px;
  font-weight:900;cursor:pointer;box-shadow:2px 2px 0 #7b4aaf;}
.sort-ok:hover{transform:translateY(-1px);}
#sortFb{text-align:center;margin-top:9px;font-size:12px;font-weight:800;min-height:16px;}

/* ── CHAPTER COMPLETE ── */
#chComplete{
  display:none;width:100%;background:#fff;border:2.5px solid #e0d6cc;
  border-radius:14px;padding:26px 20px;box-shadow:4px 4px 0 #e0d6cc;text-align:center;
}
#chComplete.show{display:block;animation:popIn 0.4s ease;}
.cc-icon{font-size:56px;margin-bottom:8px;}
.cc-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.cc-score{font-size:46px;font-weight:900;color:var(--coral);margin:6px 0;}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;}
.cc-box{background:var(--cream);border-radius:10px;padding:10px;border:2px solid #e0d6cc;}
.cc-box .cl{font-size:9px;font-weight:900;color:#bbb;text-transform:uppercase;letter-spacing:1px;}
.cc-box .cv{font-size:18px;font-weight:900;color:var(--navy);}
.cc-btns{display:flex;gap:10px;margin-top:14px;}
.cc-btn{flex:1;border:none;padding:12px;border-radius:40px;font-size:14px;font-weight:900;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:transform 0.1s;}
.cc-btn:hover{transform:translateY(-2px);}
.cc-btn.retry{background:#fff;color:var(--navy);border:2px solid #e0d6cc;box-shadow:2px 2px 0 #e0d6cc;}
.cc-btn.next{background:var(--coral);color:var(--navy);box-shadow:3px 3px 0 #c0390d;}

/* Streak badge */
#streakBadge{
  position:fixed;bottom:16px;right:14px;background:#fff;border:2px solid #e0d6cc;
  border-radius:50px;padding:7px 12px;font-size:13px;font-weight:900;color:var(--navy);
  box-shadow:3px 3px 0 #e0d6cc;z-index:50;display:none;align-items:center;gap:5px;
}
#streakBadge.hot{border-color:var(--gold);box-shadow:3px 3px 0 #fde8cc,0 0 14px rgba(243,156,18,0.4);}
#streakBadge.fire{border-color:var(--coral);box-shadow:3px 3px 0 #ffcdb8,0 0 18px rgba(255,107,53,0.5);animation:spop 0.3s ease;}

.float-xp{position:fixed;font-size:13px;font-weight:900;pointer-events:none;z-index:200;
  animation:floatUp 1.2s ease forwards;}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes tpulse{0%,100%{box-shadow:0 0 6px rgba(231,76,60,0.4)}50%{box-shadow:0 0 18px rgba(231,76,60,0.9)}}
@keyframes spop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ── NAV PREV/NEXT ── */
#navBar{width:100%;display:none;gap:8px;margin-bottom:10px;}
.nav-btn{flex:1;background:#fff;border:2px solid #e0d6cc;color:var(--navy);
  padding:9px;border-radius:10px;font-family:'Noto Sans TC',sans-serif;
  font-size:12px;font-weight:900;cursor:pointer;box-shadow:2px 2px 0 #e0d6cc;
  transition:all 0.15s;}
.nav-btn:hover:not(:disabled){border-color:var(--navy);transform:translateY(-1px);}
.nav-btn:disabled{color:#ccc;border-color:#eee;cursor:default;transform:none;}
#qCard.review{border-color:#bbb;opacity:0.85;}
#qCard.review .opt{pointer-events:none;}

/* ── EYE MOVEMENT MINI-GAME ── */
#eyeGame{
  display:none;width:100%;background:#fff;border:2.5px solid var(--teal);
  border-radius:14px;padding:18px;box-shadow:4px 4px 0 #b8ede6;margin-bottom:12px;
}
#eyeGame h2{font-size:15px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:3px;}
.eye-wrap{position:relative;width:100%;aspect-ratio:1.28;margin:12px 0;}
.eye-wrap img{width:100%;height:100%;object-fit:contain;display:block;}
.eye-dz{position:absolute;border:2.5px dashed #ccc;border-radius:8px;
  background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#bbb;transition:all 0.2s;
  text-align:center;padding:2px 4px;line-height:1.3;cursor:default;}
.eye-dz.over{border-color:var(--coral);background:rgba(255,107,53,0.15);transform:scale(1.08);}
.eye-dz.correct{border-color:var(--green);background:rgba(46,204,113,0.2);color:var(--green);}
.eye-dz.wrong{border-color:var(--red);background:rgba(231,76,60,0.15);animation:shake 0.35s ease;}
.eye-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  background:#fff;border:2px solid #e0d6cc;border-radius:12px;padding:10px 14px;
  box-shadow:2px 2px 0 #e0d6cc;}
.eye-chip{background:var(--navy);color:var(--navy);padding:7px 13px;border-radius:8px;
  font-size:12px;font-weight:900;cursor:grab;box-shadow:2px 2px 0 rgba(0,0,0,0.2);
  transition:transform 0.15s,opacity 0.15s;white-space:nowrap;touch-action:none;}
.eye-chip:hover{transform:translateY(-2px);}
.eye-chip.dragging{opacity:0.3;}
.eye-chip.placed{display:none;}
#eyeGhost{position:fixed;pointer-events:none;z-index:9999;
  background:var(--coral);color:var(--navy);padding:7px 13px;border-radius:8px;
  font-size:12px;font-weight:900;box-shadow:4px 6px 16px rgba(0,0,0,0.25);
  transform:rotate(-3deg) scale(1.08);display:none;white-space:nowrap;
  font-family:'Noto Sans TC',sans-serif;}
#eyeFb{text-align:center;margin-top:8px;font-size:12px;font-weight:800;min-height:16px;}

/* ── ORDER QUESTION TYPE ── */
#orderCard{
  display:none;width:100%;background:#fff;border:2.5px solid var(--gold);
  border-radius:14px;padding:18px;box-shadow:4px 4px 0 #b8ede6;margin-bottom:12px;
}
#orderCard h2{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.order-sub{font-size:11px;color:#aaa;font-weight:700;margin-bottom:12px;}
.order-items{display:flex;flex-direction:column;gap:7px;}
.order-item{background:#f9f5f0;border:2px solid #e0d6cc;border-radius:10px;
  padding:10px 14px;font-size:13px;font-weight:700;color:var(--navy);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:all 0.15s;box-shadow:2px 2px 0 #e0d6cc;}
.order-item:hover{border-color:var(--gold);transform:translateX(3px);}
.order-item.selected{border-color:var(--coral);background:#fff5f0;box-shadow:2px 2px 0 var(--coral);}
.order-item.locked{cursor:default;pointer-events:none;}
.order-item.correct-pos{border-color:var(--green);background:#f0fff6;color:#1a9150;}
.order-item.wrong-pos{border-color:var(--red);background:#fff5f5;color:var(--red);animation:shake 0.35s ease;}
.order-num{min-width:24px;height:24px;border-radius:50%;background:#e0d6cc;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#aaa;}
.order-num.filled{background:var(--coral);color:var(--navy);}
.order-num.correct-n{background:var(--green);color:var(--navy);}
.order-num.wrong-n{background:var(--red);color:var(--navy);}
.order-check{width:100%;margin-top:11px;background:var(--gold);color:var(--navy);border:none;
  padding:10px;border-radius:10px;font-family:'Noto Sans TC',sans-serif;
  font-size:13px;font-weight:900;cursor:pointer;box-shadow:2px 2px 0 #c8860a;}
.order-check:hover{transform:translateY(-1px);}
.order-check:disabled{opacity:0.4;cursor:default;transform:none;}
#orderFb{text-align:center;margin-top:9px;font-size:12px;font-weight:800;min-height:16px;}

</style>
</head>
<body>
<div id="flash"></div>
<div id="eventBanner"></div>
<div id="streakBadge">🔥 <span id="streakNum">0</span></div>

<!-- LEVEL UP -->
<div id="luOverlay">
  <div class="lu-icon">🎓</div>

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
let gs = {};
let unlockedChapters = [0,1,2,3,4,5,6,7,8];
let chapterScores = {};

function saveProgress() {
  try {
    localStorage.setItem('nlp_unlocked', JSON.stringify(unlockedChapters));
    localStorage.setItem('nlp_scores', JSON.stringify(chapterScores));
  } catch(e){}
}
function loadProgress() {
  try {
    const s = localStorage.getItem('nlp_scores');
    if (s) chapterScores = JSON.parse(s);
  } catch(e){}
  // All chapters unlocked for testing
  unlockedChapters = CHAPTERS.map((_,i)=>i);
}

// ═══════════════════════════════════════
// CHAPTER SELECT
// ═══════════════════════════════════════
function renderChapterSelect() {
  document.getElementById('chapterSelect').style.display = 'block';
  document.getElementById('gameScreen').style.display = 'none';
  const grid = document.getElementById('chGrid');
  grid.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const unlocked = unlockedChapters.includes(i);
    const done = chapterScores[i] !== undefined;
    const score = chapterScores[i] || 0;
    const card = document.createElement('div');
    card.className = 'ch-card' + (!unlocked ? ' locked' : '') + (done ? ' done' : '');
    card.innerHTML = `
      <div class="ch-icon">${ch.icon}</div>
      <div class="ch-info">
        <div class="ch-num">第 ${i+1} 章</div>
        <div class="ch-name">${ch.name}</div>
        <div class="ch-eng">${ch.eng}</div>
      </div>
      <div class="ch-status${done ? ' done' : !unlocked ? ' locked-txt' : ''}">
        ${done ? `✅ 最高：${score}分` : !unlocked ? '🔒 未解鎖' : '▶ 開始'}
      </div>`;
    if (unlocked) card.onclick = () => startChapter(i);
    grid.appendChild(card);
  });
}

function startChapter(idx) {
  const ch = CHAPTERS[idx];
  // Build flat deck: MCQs first, then eye game (ch3 only), then orderQs
  const mcqs = [...ch.qs].map(q => ({type:'mcq', ...q}));
  const oqs  = (ch.orderQs || []).map(oq => ({type:'order', ...oq}));
  const eyeItem = ch.eyeGame ? [{type:'eye', title:'👁 眼球線索挑戰'}] : [];
  const flatDeck = [...mcqs, ...eyeItem, ...oqs];
  gs = {
    chIdx: idx, ch,
    deck: flatDeck,
    qi: 0, score: 0, xp: 0, level: 1,
    streak: 0, bestStreak: 0,
    hints: 3,
    totalCorrect: 0, totalAnswered: 0,
    answered: false, eliminated: [],
    dotResults: new Array(flatDeck.length).fill(null),
    session: (gs.session || 0) + 1,
    history: [],
    reviewIdx: -1,
  };
  document.getElementById('chapterSelect').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('gsTitle').textContent = `${ch.icon} ${ch.name}`;
  document.getElementById('chComplete').classList.remove('show');
  document.getElementById('chComplete').style.display = 'none';
  hideEl('flipGame'); hideEl('sortGame'); hideEl('eyeGame'); hideEl('orderCard');
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextQBtn').style.display = 'none';
  document.getElementById('hintBtn').style.display = '';
  showEl('qCard'); showEl('actBar', true);
  updateUI();
  renderDots();
  loadQ();
}

function backToMenu() {
  if (gs.speedMode) stopTimer();
  // Invalidate session so stale timeouts are ignored
  gs.session = -1;
  renderChapterSelect();
}

// ═══════════════════════════════════════
// QUESTIONS
// ═══════════════════════════════════════
function renderDots() {
  const dots = document.getElementById('qDots');
  dots.innerHTML = '';
  const total = gs.deck.length;
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    const isOrder = gs.deck[i] && gs.deck[i].type === 'order';
    const isEye = gs.deck[i] && gs.deck[i].type === 'eye';
    const extra = isOrder ? ' order-dot' : isEye ? ' eye-dot' : '';
    d.className = 'q-dot' + (i === gs.qi ? ' current' : '') + extra;
    if (gs.dotResults[i] === 'correct') d.className = 'q-dot done' + extra;
    else if (gs.dotResults[i] === 'wrong') d.className = 'q-dot wrong' + extra;
    dots.appendChild(d);
  }
}

function safeRun(fn, session) {
  return () => { if (gs.session === session) fn(); };
}

function loadQ() {
  if (gs.qi >= gs.deck.length) { showChapterComplete(); return; }
  const item = gs.deck[gs.qi];

  if (item.type === 'order') {
    hideEl('qCard'); hideEl('actBar');
    startOrderQ(item);
    renderDots();
    return;
  }
  if (item.type === 'eye') {
    hideEl('qCard'); hideEl('actBar');
    gs._eyeQIdx = gs.qi; // remember position
    startEyeGame();
    renderDots();
    return;
  }

  // MCQ
  showEl('qCard'); showEl('actBar', true);
  hideEl('orderCard');
  const q = item;
  gs.answered = false; gs.eliminated = [];

  const card = document.getElementById('qCard');
  card.className = '';
  document.getElementById('qNum').textContent = `第${gs.qi+1} / ${gs.deck.length}題`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qBadge').textContent = gs.ch.name;
  document.getElementById('qBadge').className = 'q-badge';
  document.getElementById('eventTag').textContent = '';

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-ltr">${['A','B','C','D'][i]}</span>${o}`;
    btn.onclick = () => answer(i);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextQBtn').style.display = 'none';
  document.getElementById('hintBtn').style.display = '';
  updateHintBtn();
  renderDots();
  updateNavBar();
}

function answer(sel) {
  if (gs.answered) return;
  gs.answered = true;
  if (gs.speedMode) stopTimer();

  const q = gs.deck[gs.qi];
  const correct = sel === q.a;
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.disabled = true;
    if (i === q.a) b.classList.add('correct');
    else if (i === sel) b.classList.add('wrong');
    else b.classList.add('reveal');
  });

  gs.totalAnswered++;
  // Store in history for prev/next nav
  gs.history.push({q, sel, correct: sel===q.a, qi: gs.qi, deck_q: gs.deck[gs.qi]});
  gs.reviewIdx = -1; // reset review mode
  const fb = document.getElementById('feedback');

  if (correct) {
    gs.totalCorrect++;
    gs.streak++;
    if (gs.streak > gs.bestStreak) gs.bestStreak = gs.streak;
    gs.dotResults[gs.qi] = 'correct';

    let xp = 30;
    if (gs.speedMode) xp = 20 + Math.round((gs.timeLeft/12)*30);
    if (gs.multRemaining > 0) { xp *= 2; gs.multRemaining--; }
    if (gs.streak >= 5) xp += 15;
    else if (gs.streak >= 3) xp += 10;

    gs.score += xp;
    addXP(xp);
    flash('rgba(46,204,113,0.18)');
    floatXP(`+${xp}分`, '#2ecc71');
    if (gs.streak >= 3) floatXP(`🔥 ${gs.streak}連勝！`, '#f39c12', 40);
    spawnConfetti();
    fb.style.color = 'var(--green)';
    fb.textContent = gs.streak >= 5 ? `🔥 超強！${gs.streak}連勝！` :
                     gs.streak >= 3 ? `🔥 ${gs.streak}連勝加分！` : '✓ 正確！';
  } else {
    gs.streak = 0;
    gs.dotResults[gs.qi] = 'wrong';
    flash('rgba(231,76,60,0.2)');
    shakeCard();
    fb.style.color = 'var(--red)';
    fb.textContent = `✗ 答錯了！正確答案：${q.opts[q.a]}`;
  }

  updateUI();
  renderDots();
  updateNavBar();

  // Auto-advance after 1 second (session-guarded to prevent stale fires)
  const _advSess = gs.session;
  setTimeout(() => {
    if (gs.session !== _advSess) return;
    advanceQ();
  }, 2000);
}




// ═══════════════════════════════════════
// MANUAL ADVANCE
// ═══════════════════════════════════════
function advanceQ() {
  document.getElementById('nextQBtn').style.display = 'none';
  document.getElementById('hintBtn').style.display = '';
  gs.qi++;
  if (gs.qi >= gs.deck.length) { showChapterComplete(); return; }
  loadQ();
}

// ═══════════════════════════════════════
// PREV / NEXT NAVIGATION
// ═══════════════════════════════════════
function updateNavBar() {
  const nb = document.getElementById('navBar');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const hasHistory = gs.history && gs.history.length > 0;
  nb.style.display = hasHistory ? 'flex' : 'none';
  if (!hasHistory) return;
  const reviewing = gs.reviewIdx >= 0;
  prevBtn.disabled = reviewing ? gs.reviewIdx === 0 : false;
  prevBtn.textContent = reviewing && gs.reviewIdx > 0 ? '← 上一題' : '← 回顧上題';
  nextBtn.style.display = reviewing ? '' : 'none';
  nextBtn.textContent = (reviewing && gs.reviewIdx < gs.history.length - 1) ? '下一題 →' : '返回當前題 →';
}

function navPrev() {
  if (!gs.history || gs.history.length === 0) return;
  // If not reviewing yet, start from last answered
  if (gs.reviewIdx < 0) gs.reviewIdx = gs.history.length - 1;
  else if (gs.reviewIdx > 0) gs.reviewIdx--;
  showReviewQ(gs.reviewIdx);
}

function navNext() {
  if (gs.reviewIdx < 0) return;
  if (gs.reviewIdx < gs.history.length - 1) {
    gs.reviewIdx++;
    showReviewQ(gs.reviewIdx);
  } else {
    showCurrentQ();
  }
}

function showReviewQ(idx) {
  const entry = gs.history[idx];
  if (!entry) return;
  const q = entry.deck_q;

  const card = document.getElementById('qCard');
  card.className = 'review';
  document.getElementById('qNum').textContent = `回顧 第${idx+1}題（已答）`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qBadge').textContent = gs.ch.name;
  document.getElementById('qBadge').className = 'q-badge';
  document.getElementById('eventTag').textContent = '';
  document.getElementById('feedback').textContent = entry.correct ? '✓ 答對了！' : `✗ 答錯了！正確答案：${q.opts[q.a]}`;
  document.getElementById('feedback').style.color = entry.correct ? 'var(--green)' : 'var(--red)';

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-ltr">${['A','B','C','D'][i]}</span>${o}`;
    btn.disabled = true;
    if (i === q.a) btn.classList.add('correct');
    else if (i === entry.sel) btn.classList.add('wrong');
    else btn.classList.add('reveal');
    opts.appendChild(btn);
  });

  // Update nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = idx === 0;
  nextBtn.style.display = '';
  nextBtn.textContent = idx < gs.history.length - 1 ? '下一題 →' : '返回當前題 →';
}

function showCurrentQ() {
  // Return to current unanswered question without retriggering events/timers
  gs.reviewIdx = -1;
  const card = document.getElementById('qCard');
  card.className = gs.speedMode ? 'speed' : gs.multRemaining > 0 ? 'dbl' : '';
  const q = gs.deck[gs.qi];
  if (!q) return;
  gs.answered = false; gs.eliminated = [];
  document.getElementById('qNum').textContent = `第${gs.qi+1} / ${gs.deck.length}題`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qBadge').textContent = gs.ch.name;
  document.getElementById('qBadge').className = 'q-badge' + (gs.speedMode ? ' rd' : gs.multRemaining > 0 ? ' gd' : '');
  document.getElementById('eventTag').textContent = gs.speedMode ? '⚡ 速度挑戰' : gs.multRemaining > 0 ? `💎 雙倍積分 — 剩餘 ${gs.multRemaining} 題` : '';
  document.getElementById('feedback').textContent = '';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-ltr">${['A','B','C','D'][i]}</span>${o}`;
    btn.onclick = () => answer(i);
    opts.appendChild(btn);
  });
  updateHintBtn();
  renderDots();
  updateNavBar();
}


// ═══════════════════════════════════════
// EYE MOVEMENT MINI-GAME
// ═══════════════════════════════════════
const EYE_LABELS = {Vc:'視覺創造 Vc', Vr:'視覺回想 Vr', Ac:'聽覺創造 Ac', Ar:'聽覺回想 Ar', K:'感覺 K', Ad:'內心對話 Ad'};
let eyeDragging = null;

function startEyeGame() {
  hideEl('qCard'); hideEl('actBar'); showEl('eyeGame');
  document.getElementById('eyeFb').textContent = '';
  // Reset all drop zones
  ['Vc','Vr','Ac','Ar','K','Ad'].forEach(k => {
    const dz = document.getElementById('edz-'+k);
    dz.className = 'eye-dz'; dz.textContent = '?';
  });
  // Rebuild chips
  const bank = document.getElementById('eyeBank');
  bank.innerHTML = '';
  shuffle(['Vc','Vr','Ac','Ar','K','Ad']).forEach(k => {
    const chip = document.createElement('div');
    chip.className = 'eye-chip'; chip.dataset.label = k; chip.id = 'echip-'+k;
    chip.textContent = EYE_LABELS[k];
    chip.addEventListener('mousedown', eyeStartDrag);
    chip.addEventListener('touchstart', eyeStartDragTouch, {passive:false});
    bank.appendChild(chip);
  });
  eyeDragging = null;
  let eyeScore = 0;
  window._eyeScore = 0;
  window._eyeTotal = 6;
}

function eyeStartDrag(e) {
  if (e.target.classList.contains('placed')) return;
  eyeDragging = e.target; eyeDragging.classList.add('dragging');
  eyeShowGhost(eyeDragging.textContent, e.clientX, e.clientY);
  document.addEventListener('mousemove', eyeOnDrag);
  document.addEventListener('mouseup', eyeEndDrag);
  e.preventDefault();
}
function eyeStartDragTouch(e) {
  if (e.target.classList.contains('placed')) return;
  eyeDragging = e.target; eyeDragging.classList.add('dragging');
  const t = e.touches[0];
  eyeShowGhost(eyeDragging.textContent, t.clientX, t.clientY);
  document.addEventListener('touchmove', eyeOnDragTouch, {passive:false});
  document.addEventListener('touchend', eyeEndDragTouch);
  e.preventDefault();
}
function eyeShowGhost(text, x, y) {
  const g = document.getElementById('eyeGhost');
  g.textContent = text; g.style.display = 'block'; eyeMoveGhost(x, y);
}
function eyeMoveGhost(x, y) {
  const g = document.getElementById('eyeGhost');
  g.style.left = (x - g.offsetWidth/2) + 'px';
  g.style.top  = (y - g.offsetHeight/2 - 10) + 'px';
}
function eyeOnDrag(e) { eyeMoveGhost(e.clientX, e.clientY); eyeHighlight(e.clientX, e.clientY); }
function eyeOnDragTouch(e) { const t=e.touches[0]; eyeMoveGhost(t.clientX, t.clientY); eyeHighlight(t.clientX, t.clientY); e.preventDefault(); }
function eyeHighlight(x, y) {
  document.querySelectorAll('.eye-dz:not(.correct)').forEach(dz => {
    const r = dz.getBoundingClientRect();
    dz.classList.toggle('over', x>=r.left && x<=r.right && y>=r.top && y<=r.bottom);
  });
}
function eyeEndDrag(e) { document.removeEventListener('mousemove', eyeOnDrag); document.removeEventListener('mouseup', eyeEndDrag); eyeDrop(e.clientX, e.clientY); }
function eyeEndDragTouch(e) { document.removeEventListener('touchmove', eyeOnDragTouch); document.removeEventListener('touchend', eyeEndDragTouch); const t=e.changedTouches[0]; eyeDrop(t.clientX, t.clientY); }
function eyeDrop(x, y) {
  document.getElementById('eyeGhost').style.display = 'none';
  if (!eyeDragging) return;
  eyeDragging.classList.remove('dragging');
  document.querySelectorAll('.eye-dz:not(.correct)').forEach(dz => {
    dz.classList.remove('over');
    const r = dz.getBoundingClientRect();
    if (x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) {
      if (dz.dataset.label === eyeDragging.dataset.label) {
        dz.classList.add('correct'); dz.textContent = EYE_LABELS[dz.dataset.label];
        eyeDragging.classList.add('placed');
        window._eyeScore = (window._eyeScore||0) + 1;
        spawnConfetti();
        const fb = document.getElementById('eyeFb');
        if (window._eyeScore === 6) {
          const reward = 250; gs.score += reward; addXP(reward);
          floatXP('+'+reward+'分', 'var(--teal)'); updateUI();
          fb.style.color='var(--green)'; fb.textContent='🎉 全部正確！眼球線索大師！+'+reward+'分';
          { const _s=gs.session; setTimeout(safeRun(endEyeGame,_s), 2200); }
        } else {
          fb.style.color='var(--green)'; fb.textContent='✓ 正確！還剩 '+(6-window._eyeScore)+' 個';
        }
      } else {
        dz.classList.add('wrong'); setTimeout(()=>dz.classList.remove('wrong'), 500);
        document.getElementById('eyeFb').style.color='var(--red)';
        document.getElementById('eyeFb').textContent='✗ 位置不對，再試試！';
      }
    }
  });
  eyeDragging = null;
}
function endEyeGame() {
  // Record result and advance
  gs.dotResults[gs.qi] = window._eyeScore === 6 ? 'correct' : (window._eyeScore >= 3 ? 'correct' : 'wrong');
  gs.totalAnswered++;
  if (window._eyeScore === 6) gs.totalCorrect++;
  gs.qi++;
  hideEl('eyeGame');
  if (gs.qi >= gs.deck.length) { showChapterComplete(); return; }
  showEl('qCard'); showEl('actBar', true); updateNavBar();
  loadQ();
}

// ═══════════════════════════════════════
// ORDER QUESTION MINI-GAME
// ═══════════════════════════════════════
let orderState = {items:[], selected:null, placed:[], correctOrder:[]};

function startOrderQ(oq) {
  hideEl('qCard'); hideEl('actBar'); showEl('orderCard');
  document.getElementById('orderTitle').textContent = '🔢 ' + oq.title;
  document.getElementById('orderSub').textContent = oq.sub;
  document.getElementById('orderFb').textContent = '';
  document.getElementById('orderCheck').disabled = true;

  // Shuffle display order
  const shuffled = shuffle(oq.items.map((text, i) => ({text, correctIdx: i})));
  orderState = {items: shuffled, selected: null, placed: [], correctOrder: oq.order, oq};

  renderOrderItems();
}

function renderOrderItems() {
  const container = document.getElementById('orderItems');
  container.innerHTML = '';
  orderState.items.forEach((item, displayIdx) => {
    const div = document.createElement('div');
    div.className = 'order-item';
    const placedPos = orderState.placed.indexOf(displayIdx);
    const isPlaced = placedPos !== -1;

    if (isPlaced) div.classList.add('selected');

    const num = document.createElement('div');
    num.className = 'order-num' + (isPlaced ? ' filled' : '');
    num.textContent = isPlaced ? (placedPos + 1) : '?';

    const txt = document.createElement('span');
    txt.textContent = item.text;

    // Tap hint
    const hint = document.createElement('span');
    hint.style.cssText = 'margin-left:auto;font-size:9px;color:#bbb;font-weight:700;';
    hint.textContent = isPlaced ? '✕ 取消' : '';

    div.appendChild(num); div.appendChild(txt); div.appendChild(hint);
    div.onclick = () => selectOrderItem(displayIdx);
    container.appendChild(div);
  });
  document.getElementById('orderCheck').disabled = orderState.placed.length < orderState.items.length;
}

// Simpler tap-to-sequence: each tap adds item to sequence
function selectOrderItem(idx) {
  const placedPos = orderState.placed.indexOf(idx);
  if (placedPos !== -1) {
    // Deselect: remove from placed array and all items after it shift back
    orderState.placed.splice(placedPos, 1);
  } else {
    orderState.placed.push(idx);
  }
  renderOrderItems();
}

function checkOrder() {
  const {items, placed, correctOrder} = orderState;
  let correct = 0;
  const container = document.getElementById('orderItems');
  const divs = container.querySelectorAll('.order-item');

  placed.forEach((displayIdx, posIdx) => {
    const item = items[displayIdx];
    const isCorrect = item.correctIdx === posIdx;
    if (isCorrect) correct++;
    divs[displayIdx].classList.remove('locked');
    divs[displayIdx].classList.add(isCorrect ? 'correct-pos' : 'wrong-pos');
    const num = divs[displayIdx].querySelector('.order-num');
    num.className = 'order-num ' + (isCorrect ? 'correct-n' : 'wrong-n');
    num.textContent = posIdx + 1;
  });

  const total = items.length;
  const xp = Math.round((correct/total) * 150);
  const fb = document.getElementById('orderFb');
  if (correct === total) {
    fb.style.color = 'var(--green)';
    fb.textContent = `🎉 完美！順序全對！+${xp}分`;
    gs.totalCorrect++; spawnConfetti();
  } else {
    fb.style.color = correct >= total/2 ? 'var(--gold)' : 'var(--red)';
    fb.textContent = `${correct}/${total} 正確。+${xp}分`;
  }
  gs.totalAnswered++;
  gs.dotResults[gs.qi] = correct === total ? 'correct' : 'wrong';
  if (xp > 0) { gs.score += xp; addXP(xp); floatXP('+'+xp+'分', 'var(--gold)'); updateUI(); }
  renderDots();
  document.getElementById('orderCheck').disabled = true;
  document.getElementById('orderCheck').textContent = '已提交';
  { const _s=gs.session; setTimeout(safeRun(endOrderQ,_s), 2500); }
}

function endOrderQ() {
  hideEl('orderCard');
  gs.qi++;
  if (gs.qi >= gs.deck.length) { showChapterComplete(); return; }
  showEl('qCard'); showEl('actBar', true); updateNavBar();
  loadQ();
}


// ═══════════════════════════════════════
// RANDOM EVENTS
// ═══════════════════════════════════════
function triggerEvent() {
  // Build event pool — add eyeGame only for ch2 (Rapport), orderQ only for ch8 (Timeline)
  let events = ['speed','doublexp','flip','sort'];
  if (gs.chIdx === 2 && !gs._eyeDone) events = ['eye','eye','flip','sort'];
  if (gs.chIdx === 8) events = ['speed','doublexp','flip','sort','order'];
  const e = events[Math.floor(Math.random() * events.length)];
  gs.questionsUntilEvent = rand(3, 6);

  if (e === 'speed') {
    showBanner('⚡ 速度挑戰！越快作答，得分越高！', 'speed');
    gs.speedMode = true;
    { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();loadQ();},_s), 2200); }
  } else if (e === 'doublexp') {
    showBanner('💎 雙倍積分！接下來3題分數加倍！', 'gold');
    gs.multRemaining = 3;
    { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();loadQ();},_s), 2200); }
  } else if (e === 'flip') {
    showBanner('🃏 配對挑戰！配對NLP詞彙，贏取額外分數！', 'blue');
    { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();startFlip();},_s), 2200); }
  } else if (e === 'sort') {
    showBanner('⚡ 分類挑戰！將NLP概念分類，贏取分數！', 'purple');
    { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();startSort();},_s), 2200); }
  } else if (e === 'eye') {
    gs._eyeDone = true;
    showBanner('👁 眼球線索挑戰！拖放標籤到正確位置！', 'teal');
    { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();startEyeGame();},_s), 2200); }
  } else if (e === 'order') {
    const oqs = gs.ch.orderQs;
    if (oqs && oqs.length > 0) {
      const oq = oqs[Math.floor(Math.random() * oqs.length)];
      showBanner('🔢 排列順序挑戰！按正確順序點選項目！', 'gold');
      { const _s=gs.session; setTimeout(safeRun(()=>{hideBanner();startOrderQ(oq);},_s), 2200); }
    } else {
      setTimeout(loadQ, 100);
    }
  }
}

// ═══════════════════════════════════════
// SPEED TIMER
// ═══════════════════════════════════════
function startTimer() {
  gs.timeLeft = 12;
  const wrap = document.getElementById('timerWrap');
  const bar = document.getElementById('timerBar');
  wrap.style.display = 'block';
  bar.style.width = '100%';
  bar.classList.add('tpulse');
  gs.speedTimer = setInterval(() => {
    gs.timeLeft -= 0.1;
    const pct = Math.max(0, (gs.timeLeft/12)*100);
    bar.style.width = pct+'%';
    bar.style.background = pct>50 ? 'var(--green)' : pct>25 ? 'var(--gold)' : 'var(--red)';
    if (gs.timeLeft <= 0 && !gs.answered) { stopTimer(); answer(-1); }
  }, 100);
}
function stopTimer() {
  clearInterval(gs.speedTimer);
  gs.speedMode = false;
  document.getElementById('timerWrap').style.display = 'none';
  document.getElementById('timerBar').classList.remove('tpulse');
}

// ═══════════════════════════════════════
// FLIP MINI-GAME
// ═══════════════════════════════════════
function startFlip() {
  hideEl('qCard'); hideEl('actBar'); showEl('flipGame');
  const pairs = shuffle([...gs.ch.flipPairs]).slice(0, 4);
  const reward = 180;
  document.getElementById('flipReward').textContent = `+${reward}`;
  const cards = shuffle([
    ...pairs.map((p,i) => ({text:p[0], pid:i})),
    ...pairs.map((p,i) => ({text:p[1], pid:i}))
  ]);
  const grid = document.getElementById('flipGrid');
  grid.innerHTML = '';
  document.getElementById('flipFb').textContent = '';
  let flipped=[], matched=0, locked=false;
  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'fc';
    el.innerHTML = `<div class="fc-f"></div><div class="fc-b">${card.text}</div>`;
    el.addEventListener('click', () => {
      if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      flipped.push({el, card});
      if (flipped.length===2) {
        locked = true;
        setTimeout(() => {
          if (flipped[0].card.pid === flipped[1].card.pid) {
            flipped.forEach(f => f.el.classList.add('matched'));
            matched++;
            const flipFb = document.getElementById('flipFb');
            flipFb.style.color = 'var(--green)';
            flipFb.textContent = matched<4 ? `✓ 配對成功！還剩 ${4-matched} 對` : `🎉 全部配對！+${reward}分`;
            if (matched===4) {
              addXP(reward); gs.score += reward;
              floatXP(`+${reward}分`, '#3498db');
              spawnConfetti(); updateUI();
              { const _s=gs.session; setTimeout(safeRun(endFlip,_s), 1600); }
            }
          } else {
            flipped.forEach(f => f.el.classList.remove('flipped'));
            document.getElementById('flipFb').style.color='var(--red)';
            document.getElementById('flipFb').textContent='不配對，再試試！';
          }
          flipped=[]; locked=false;
        }, 900);
      }
    });
    grid.appendChild(el);
  });
  setTimeout(() => { if (document.getElementById('flipGame').style.display!=='none') endFlip(); }, 32000);
}
function endFlip() { hideEl('flipGame'); showEl('qCard'); showEl('actBar', true); updateNavBar(); loadQ(); }

// ═══════════════════════════════════════
// SORT MINI-GAME
// ═══════════════════════════════════════
let selChip = null;
function startSort() {
  hideEl('qCard'); hideEl('actBar'); showEl('sortGame');
  const sc = gs.ch.sortChallenge;
  document.getElementById('sortTitle').textContent = `⚡ ${sc.title}`;
  document.getElementById('sortSub').textContent = sc.sub;
  document.getElementById('sortFb').textContent = '';
  selChip = null;

  const allItems = Object.values(sc.correct).flat();
  const correct = {};
  Object.entries(sc.correct).forEach(([bin, items]) => items.forEach(item => correct[item]=bin));
  gs.sortCorrect = correct;
  gs.sortUserBins = {};
  sc.bins.forEach(b => gs.sortUserBins[b] = []);

  const pool = document.getElementById('sortPool');
  pool.innerHTML = '';
  shuffle([...allItems]).forEach(item => {
    const chip = document.createElement('div');
    chip.className = 's-chip';
    chip.textContent = item;
    chip.dataset.item = item;
    chip.onclick = () => {
      if (chip.dataset.placed==='true') return;
      document.querySelectorAll('.s-chip.sel').forEach(c=>c.classList.remove('sel'));
      if (selChip===chip) { selChip=null; return; }
      chip.classList.add('sel'); selChip=chip;
    };
    pool.appendChild(chip);
  });

  const bins = document.getElementById('sortBins');
  bins.innerHTML = '';
  sc.bins.forEach(binLabel => {
    const bin = document.createElement('div');
    bin.className = 's-bin';
    bin.dataset.bin = binLabel;
    bin.innerHTML = `<h3>${binLabel}</h3><div class="s-bin-chips" id="sbc-${encodeB(binLabel)}"></div>`;
    bin.onclick = (e) => { if (!e.target.classList.contains('s-bin-chip')) dropBin(binLabel); };
    bins.appendChild(bin);
  });
}

function encodeB(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }

function dropBin(binLabel) {
  if (!selChip) return;
  const item = selChip.dataset.item;
  const prevBin = selChip.dataset.placedBin;
  if (prevBin) {
    gs.sortUserBins[prevBin] = gs.sortUserBins[prevBin].filter(x=>x!==item);
    const prevEl = document.getElementById(`sbc-${encodeB(prevBin)}`);
    if (prevEl) { const old=prevEl.querySelector(`[data-item="${item}"]`); if(old) old.remove(); }
  }
  gs.sortUserBins[binLabel].push(item);
  selChip.dataset.placedBin = binLabel;
  selChip.dataset.placed = 'true';
  selChip.classList.remove('sel');
  selChip.style.display = 'none';
  const bEl = document.getElementById(`sbc-${encodeB(binLabel)}`);
  const bc = document.createElement('div');
  bc.className = 's-bin-chip'; bc.textContent = item; bc.dataset.item = item;
  bc.onclick = () => returnChip(item, binLabel);
  bEl.appendChild(bc);
  selChip = null;
}

function returnChip(item, binLabel) {
  const chip = document.querySelector(`.s-chip[data-item="${item}"]`);
  if (chip) { chip.style.display=''; chip.dataset.placed='false'; chip.dataset.placedBin=''; }
  gs.sortUserBins[binLabel] = gs.sortUserBins[binLabel].filter(x=>x!==item);
  const bEl = document.getElementById(`sbc-${encodeB(binLabel)}`);
  if (bEl) { const el=bEl.querySelector(`[data-item="${item}"]`); if(el) el.remove(); }
}

function checkSort() {
  const {sortCorrect, sortUserBins} = gs;
  let right=0, total=Object.keys(sortCorrect).length;
  Object.entries(sortUserBins).forEach(([bin,items]) => {
    items.forEach(item => { if(sortCorrect[item]===bin) right++; });
  });
  const xp = Math.round((right/total)*120);
  const fb = document.getElementById('sortFb');
  if (right===total) {
    fb.style.color='var(--green)'; fb.textContent=`🎉 全部正確！+${xp}分`;
    spawnConfetti();
  } else {
    fb.style.color=right>total/2?'var(--gold)':'var(--red)';
    fb.textContent=`${right}/${total} 正確。+${xp}分`;
  }
  if (xp>0) { addXP(xp); gs.score+=xp; floatXP(`+${xp}分`, '#9b59b6'); updateUI(); }
  { const _s=gs.session; setTimeout(safeRun(endSort,_s), 2200); }
}
function endSort() { hideEl('sortGame'); showEl('qCard'); showEl('actBar',true); updateNavBar(); loadQ(); }

// ═══════════════════════════════════════
// HINTS
// ═══════════════════════════════════════
function useHint() {
  if (gs.score < 50 || gs.hints <= 0 || gs.answered) return;
  const q = gs.deck[gs.qi];
  const btns = document.querySelectorAll('.opt');
  const wrongs = shuffle([0,1,2,3].filter(i=>i!==q.a&&!gs.eliminated.includes(i)));
  wrongs.slice(0,2).forEach(i=>{btns[i].classList.add('dim');btns[i].disabled=true;gs.eliminated.push(i);});
  gs.score = Math.max(0, gs.score-50);
  gs.hints--;
  floatXP('−50分', '#aaa');
  updateUI(); updateHintBtn();
}
function updateHintBtn() {
  const btn = document.getElementById('hintBtn');
  btn.disabled = gs.score < 50 || gs.hints <= 0 || gs.answered;
  document.getElementById('hintsVal').textContent = gs.hints;
}

// ═══════════════════════════════════════
// XP & LEVEL
// ═══════════════════════════════════════
function addXP(amt) {
  gs.xp += amt;
  const cap = gs.level * 150;
  if (gs.xp >= cap) { gs.xp -= cap; gs.level++; }
}

// ═══════════════════════════════════════
// CHAPTER COMPLETE
// ═══════════════════════════════════════
function showChapterComplete() {
  hideEl('qCard'); hideEl('actBar');
  if (gs.speedMode) stopTimer();
  const acc = gs.deck.length>0 ? Math.round(gs.totalCorrect/gs.deck.length*100) : 0;
  const passed = acc >= 90;
  const grade = acc>=90?'S':acc>=80?'A':acc>=70?'B':acc>=60?'C':'D';
  const icons = {S:'🏆',A:'⭐',B:'😊',C:'😐',D:'💪'};
  const prevBest = chapterScores[gs.chIdx] || 0;
  if (gs.score > prevBest) chapterScores[gs.chIdx] = gs.score;
  // Only unlock next chapter if 90%+ accuracy
  if (passed && gs.chIdx+1 < CHAPTERS.length && !unlockedChapters.includes(gs.chIdx+1)) {
    unlockedChapters.push(gs.chIdx+1);
  }
  saveProgress();
  document.getElementById('ccIcon').textContent = passed ? (icons[grade]||'🎉') : '😅';
  document.getElementById('ccTitle').textContent = passed ? `第${gs.chIdx+1}章完成！` : `差一點點！`;
  document.getElementById('ccScore').textContent = gs.score;
  document.getElementById('ccCorrect').textContent = `${gs.totalCorrect}/${gs.deck.length}`;
  document.getElementById('ccAcc').textContent = acc+'%';
  document.getElementById('ccStreak').textContent = gs.bestStreak;
  document.getElementById('ccGrade').textContent = grade;
  const nextBtn = document.getElementById('nextChBtn');
  if (gs.chIdx+1 < CHAPTERS.length) {
    if (passed) {
      nextBtn.textContent = `第${gs.chIdx+2}章 →`;
      nextBtn.style.display = '';
      nextBtn.disabled = false;
      nextBtn.style.opacity = '1';
      nextBtn.style.cursor = 'pointer';
    } else {
      nextBtn.textContent = `🔒 需達90%才能解鎖（你：${acc}%）`;
      nextBtn.style.display = '';
      nextBtn.disabled = true;
      nextBtn.style.opacity = '0.45';
      nextBtn.style.cursor = 'not-allowed';
    }
  } else {
    nextBtn.textContent = '🏆 課程完成！';
    nextBtn.disabled = false;
    nextBtn.style.opacity = '1';
  }
  const cc = document.getElementById('chComplete');
  cc.style.display = 'block';
  cc.classList.add('show');
  if (passed) { spawnConfetti(); spawnConfetti(); }
  // Show unlock banner only if newly passed
  if (passed && gs.chIdx+1 < CHAPTERS.length && !chapterScores[gs.chIdx+1]) {
    { const _s=gs.session; setTimeout(safeRun(()=>showLU(gs.chIdx+1),_s), 800); }
  }
}

function retryChapter() { startChapter(gs.chIdx); }
function nextChapter() {
  const next = gs.chIdx+1;
  if (next < CHAPTERS.length) startChapter(next);
  else backToMenu();
}

let showingLU = false;
function showLU(nextIdx) {
  showingLU = true;
  const nextCh = CHAPTERS[nextIdx];
  document.getElementById('luTitle').textContent = '🎓 解鎖新章節！';
  document.getElementById('luNext').textContent = `${nextCh.icon} ${nextCh.name}`;
  document.getElementById('luDesc').textContent = nextCh.eng;
  document.getElementById('luXp').textContent = `+200 獎勵積分`;
  gs.score += 200;
  document.getElementById('luOverlay').classList.add('show');
}
function dismissLU() {
  document.getElementById('luOverlay').classList.remove('show');
  showingLU = false;
}

// ═══════════════════════════════════════
// UPDATE UI
// ═══════════════════════════════════════
function updateUI() {
  document.getElementById('scoreVal').textContent = gs.score;
  document.getElementById('gsLvl').textContent = gs.level;
  const acc = gs.totalAnswered>0 ? Math.round(gs.totalCorrect/gs.totalAnswered*100)+'%' : '—';
  document.getElementById('accVal').textContent = acc;
  document.getElementById('progVal').textContent = `${gs.totalAnswered}/${gs.deck ? gs.deck.length : 0}`;
  document.getElementById('hintsVal').textContent = gs.hints;
  const cap = gs.level*150;
  document.getElementById('xpLabel').textContent = `${gs.xp} / ${cap}`;
  document.getElementById('xpFill').style.width = Math.min(100,(gs.xp/cap)*100)+'%';
  const sb = document.getElementById('streakBadge');
  document.getElementById('streakNum').textContent = gs.streak;
  if (!gs.streak) { sb.style.display='none'; }
  else { sb.style.display='flex'; sb.className=gs.streak>=5?'fire':gs.streak>=3?'hot':''; }
}

// ═══════════════════════════════════════
// EFFECTS
// ═══════════════════════════════════════
function flash(color) {
  const f=document.getElementById('flash');
  f.style.background=color; f.style.opacity=1;
  setTimeout(()=>f.style.opacity=0,180);
}
function shakeCard() {
  const c=document.getElementById('qCard');
  c.style.animation='shake 0.4s ease';
  setTimeout(()=>c.style.animation='',400);
}
function floatXP(text, color, xOff=0) {
  const el=document.createElement('div');
  el.className='float-xp'; el.textContent=text; el.style.color=color;
  el.style.left=`calc(50% + ${xOff}px)`; el.style.top=`${160+Math.random()*80}px`;
  el.style.transform='translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}
function spawnConfetti() {
  const colors=['#FF6B35','#2ecc71','#f39c12','#3498db','#9b59b6','#1abc9c'];
  for (let i=0;i<18;i++) {
    const el=document.createElement('div');
    const dx=(Math.random()-.5)*230, dy=-(60+Math.random()*130), dr=(Math.random()-.5)*900;
    const id='c'+Date.now()+i;
    const s=document.createElement('style');
    s.textContent=`@keyframes ${id}{0%{transform:translate(0,0)rotate(0);opacity:1}100%{transform:translate(${dx}px,${dy}px)rotate(${dr}deg);opacity:0}}`;
    el.style.cssText=`position:fixed;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${colors[i%colors.length]};left:${25+Math.random()*50}%;top:36%;pointer-events:none;z-index:9998;animation:${id} ${0.6+Math.random()*0.6}s ease-out forwards;`;
    document.head.appendChild(s); document.body.appendChild(el);
    setTimeout(()=>{el.remove();s.remove();},1400);
  }
}
function showBanner(text, type) {
  const b=document.getElementById('eventBanner');
  b.textContent=text; b.className=`show ${type}`;
}
function hideBanner() { document.getElementById('eventBanner').className=''; }

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function showEl(id, flex=false) { document.getElementById(id).style.display=flex?'flex':'block'; }
function hideEl(id) { document.getElementById(id).style.display='none'; }
function shuffle(a) { return a.sort(()=>Math.random()-.5); }
function rand(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

// START
loadProgress();
renderChapterSelect();
</script>
